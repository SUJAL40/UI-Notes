<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marquee</title>
    <style>
        .container{
            display: flex;
        }
    </style>
</head>

<body>
    <marquee behavior="alternate" direction="left" scrollamount="20" loop="3">
        Today offer is 20% discount on any product
    </marquee>
    <div class="container">
        <marquee behavior="" direction="left" scrollamount="20">
            <img src="./image/a1.jpg" alt="" width="100" height="100">
            <img src="./image/a2.jpg" alt="" width="100" height="100">
            <img src="./image/a3.jpg" alt="" width="100" height="100">
            <img src="./image/a4.jpg" alt="" width="100" height="100">
            <img src="./image/a5.jpg" alt="" width="100" height="100">
        </marquee>
        <marquee behavior="" direction="right" scrollamount="20">
            <img src="./image/a6.jpg" alt="" width="100" height="100">
            <img src="./image/a7.jpg" alt="" width="100" height="100">
            <img src="./image/a8.jpg" alt="" width="100" height="100">
            <img src="./image/a9.jpg" alt="" width="100" height="100">
            <img src="./image/a10.jpg" alt="" width="100" height="100">
        </marquee>
    </div>
</body>

</html>
