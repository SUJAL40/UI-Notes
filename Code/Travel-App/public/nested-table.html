<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Table</title>
    <style>
        td{
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <table width="100%" border="1" cellspacing="10" cellpadding="10">
        <tr height="100">
            <td colspan="3" align="center">Header</td>
        </tr>
        <tr height="400">
            <td width="20%">Nav</td>
            <td width="70%">
                <table width="100%" cellspacing="10" frame="void" border="1">
                    <tr height="400">
                        <td><img src="./image/women-fashion.jpg" width="100%"></td>
                        <td><img src="./image/men-fashion.jpg" width="100%"></td>
                        <td><img src="./image/kids-fashion.jpg" width="100%"></td>
                    </tr>
                </table>
            </td>
            <td width="10%">Aside</td>
        </tr>
        <tr>
            <td colspan="3" align="center">footer</td>
        </tr>
    </table>

</body>

</html>
