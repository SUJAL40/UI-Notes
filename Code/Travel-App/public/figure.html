<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure </title>
    <style>
        .women-fashion {
            background-image: url('./image/women-fashion.jpg');
            background-size: cover;
            width: 200px;
            height: 300px;
        }

        .men-fashion {
            background-image: url('./image/men-fashion.jpg');
            background-size: cover;
            width: 200px;
            height: 300px;
        }

        .kids-fashion {
            background-image: url('./image/kids-fashion.jpg');
            background-size: cover;
            width: 200px;
            height: 300px;
        }

        figure {
            border: 1px solid black;
            padding: 10px;
            width: 200px;
        }

        figcaption {
            background-color: maroon;
            color: white;
            padding: 5px;
            text-align: center;
            margin-top: 10px;
        }

        body{
            display: flex;
        }
    </style>
</head>

<body>
    <figure>
        <div class="women-fashion">

        </div>
        <figcaption>Women Fashion</figcaption>
    </figure>

    <figure>
        <div class="men-fashion">

        </div>
        <figcaption>Men Fashion</figcaption>
    </figure>

    <figure>
        <div class="kids-fashion">

        </div>
        <figcaption>Kids Fashion</figcaption>
    </figure>
</body>

</html>
