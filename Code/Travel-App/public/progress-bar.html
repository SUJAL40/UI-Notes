<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>

</head>

<body class="container-fluid">
    <h2>Progress Bar</h2>
    <div class="progress">
        <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width:30%"> 30% completed
        </div>
        <div class="progress-bar bg-warning progress-bar-striped" style="width: 40%;"> 40% processing </div>
        <div class="progress-bar bg-danger progress-bar-striped" style="width: 30%;"> 30% pending </div>
    </div>

    <h2>Spinners</h2>
    <button class="btn btn-primary"> <span class="spinner-border spinner-border-sm"></span> Loading </button>
    <button class="btn btn-primary"> <span class="spinner-grow spinner-grow-sm"></span> Loading </button>

</body>

</html>
