<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with CSS</title>
    <style>
        input:optional+span {
            display: none;
        }

        input:required+span {
            display: inline;
            color: red;
        }

        .mobile~div {
            display: none;
        }

        .mobile:invalid~div {
            display: block;
            color: red;
            font-size: 14px;
        }

        .username:invalid~div {
            display: block;
            color: red;
            font-size: 14px;
        }

        .username:valid~div {
            display: none;
        }

        .username:valid {
            outline: none;
            border: 1px solid green;
        }

        .username:valid+span {
            display: none;
        }

        .age:in-range+div{
            display: none;
        }

        .age:out-of-range+div{
            display: block;
            color: red;
        }
    </style>
</head>

<body>
    <form>
        <dl>
            <dt>User Name</dt>
            <dd>
                <input class="username" type="text" required><span>*</span>
                <div>User Name required</div>
            </dd>
            <dt>Password</dt>
            <dd><input type="password" required><span>*</span></dd>
            <dt>Mobile</dt>
            <dd>
                <input type="text" class="mobile" pattern="\+91\d{10}"> <span> *</span>
                <div>Invalid Mobile</div>
            </dd>
            <dt>Age</dt>
            <dd>
                <input type="number" min="15" max="30" class="age">
                <div>Age 15 to 30 only</div>
            </dd>
        </dl>
        <button>Login</button>
    </form>

</body>

</html>
