<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leet Code</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        header {
            background-color: rgb(206, 191, 191);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-family: Arial;
            font-size: 20px;
        }

        header span {
            margin-right: 10px;
        }

        .btn-premium {
            color: goldenrod;
            border: 1px solid gold;
            padding: 5px;
            background-color: white;
            border-radius: 8px;
        }

        section {
            margin-top: 10px;
            height: 500px;
            display: grid;
            grid-template-columns: 6fr 6fr;
            grid-gap: 10px;
        }

        .panel-left,
        .panel-right {
            background-color: white;
            height: 500px;
            padding: 10px;
        }

        .panel-left {
            overflow: auto;
        }

        body {
            background-color: rgb(226, 225, 225);
        }

        .short-cuts {
            background-color: rgb(230, 223, 223);
            padding: 5px;
            font-family: Arial;
            font-size: 16px;

        }

        .short-cuts span {
            margin-right: 20px;
        }

        h1 {
            font-family: arial;
            font-size: 20px;
        }

        .easy,
        .bi-lock-fill {
            background-color: lightgray;
            padding: 5px;
            border-radius: 5px;
            margin-right: 5px;
            font-family: Arial;
            font-size: 14px;
            color: darkcyan;
        }

    </style>
</head>

<body>
    <header>
        <div>
            <span>30 Days JavaScript</span>
            <span class="bi bi-chevron-left"></span>
            <span class="bi bi-chevron-right"></span>
            <span class="bi bi-shuffle"></span>
        </div>
        <div>
            <span class="bi bi-bug"></span>
            <span class="bi bi-play">Run</span>
            <span class="bi bi-cloud-arrow-up">Submit</span>
            <span class="bi bi-file-earmark"> </span>
        </div>
        <div>
            <span class="bi bi-gear"></span>
            <span>Register</span>
            <span>or</span>
            <span>Signin</span>
            <span class="btn-premium">Premium</span>
        </div>

    </header>
    <section>
        <div class="panel-left">
            <div class="short-cuts">
                <span class="bi bi-journal-text"> Description</span>
                <span class="bi bi-book"> Editorial</span>
                <span class="bi bi-hourglass"> Solutions</span>
                <span class="bi bi-arrow-counterclockwise"> Submissions</span>
            </div>
            <div>
                <h1>2667.Create Hellow World function</h1>
                <div>
                    <span class="easy">Easy</span>
                    <span class="bi bi-lock-fill">Companies </span>
                </div>
            </div>
        </div>
        <div class="panel-right">

        </div>
    </section>
</body>

</html>
