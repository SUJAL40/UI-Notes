<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandKit</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        header {
            padding: 20px;
            display: flex;
            /* keep content side by side */
            justify-content: space-around;
            font-family: arial;
            font-size: 18px;
        }

        .brand-title {
            color: #335EEA;
            font-weight: bold;
            font-size: 20px;
            font-family: arial;
        }

        nav span {
            padding-left: 20px;
            font-family: calibri;
        }

        .btn-buy {
            background-color: blue;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        .landkit-title {
            width: 50%;
            padding-left: 100px;
            padding-top: 100px;
        }

        .title {
            font-family: Arial;
            font-size: 50px;
            color: blue;
        }

        .sub-title {
            font-family: Arial;
            font-size: 25px;
        }

        .text {
            font-size: 16px;
            font-family: Arial;
            width: 400px;
            line-height: 30px;
            color: gray;
        }

        .btn-pages,
        .btn-doc {
            width: 120px;
            padding: 10px;
            text-align: center;
            border: 1px solid grey;
            margin-top: 20px;
            display: inline-block;
            border-radius: 3px;
            font-size: 15px;
            font-family: Arial;
        }

        .btn-pages {
            background-color: blue;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <div class="brand-title">
            <span>Landkit.</span>
        </div>
        <div>
            <nav>
                <span>Landings</span>
                <span>Pages</span>
                <span>Accounts</span>
                <span>Documentation</span>
            </nav>
        </div>
        <div>
            <!-- <button>Buy now</button> -->
            <span class="btn-buy">Buy now</span>
        </div>
    </header>

    <section>
        <main>
            <img src="./image/landkit-banner.jpg" alt="Banner" width="50%" align="right">

            <div class="landkit-title">
                <h1 class="title">Welcome to Landkit.</h1>
                <h2 class="sub-title">Develop anything.</h2>
                <p class="text">Building a beautiful , modern website with flexible bootstrap component build form
                    scratch</p>
                <span class="btn-pages"> View Pages <span class="bi bi-arrow-right"></span> </span>
                <span class="btn-doc">Documents</span>
            </div>
        </main>
    </section>

</body>

</html>
