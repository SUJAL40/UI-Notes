<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandKit</title>
    <style>
        header {
            padding: 20px;
            display: flex;
            /* keep content side by side */
            justify-content: space-around;
            font-family: arial;
            font-size: 18px;
        }

        .brand-title {
            color: #335EEA;
            font-weight: bold;
            font-size: 20px;
            font-family: arial;
        }

        nav span {
            padding-left: 20px;
            font-family: calibri;
        }

        .btn-buy {
            background-color: blue;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <header>
        <div class="brand-title">
            <span>Landkit.</span>
        </div>
        <div>
            <nav>
                <span>Landings</span>
                <span>Pages</span>
                <span>Accounts</span>
                <span>Documentation</span>
            </nav>
        </div>
        <div>
            <!-- <button>Buy now</button> -->
            <span class="btn-buy">Buy now</span>
        </div>
    </header>

</body>

</html>
