<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFC FORM</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    <script>
        function SummaryClick() {
            document.getElementById("lblName").innerHTML = document.getElementById("txtName").value;
            document.getElementById("lblMobile").innerHTML = document.getElementById("txtMobile").value;
            var mealName = "";
            var adonName = "";
            var mealCost = 0;
            var adonCost = 0;
            var total = 0;

            var optBurger = document.getElementById("optBurger");
            var optRoller = document.getElementById("optRoller");
            var imgMeal = document.getElementById("imgMeal");
            var imgCrusher = document.getElementById("crusher");
            var imgHotWings = document.getElementById("hotWings");

            if (optBurger.checked) {
                mealName = optBurger.value;
                mealCost = 120;
                imgMeal.style.display = "block";
                imgMeal.src = "../image/omg.jpeg";
            }

            if (optRoller.checked) {
                mealName = optRoller.value;
                mealCost = 150;
                imgMeal.style.display = "block";
                imgMeal.src = "../image/omg-2.jpeg";

            }

            var optKrusher = document.getElementById("optKrusher");
            var optWings = document.getElementById("optWings");

            if (optKrusher.checked) {
                adonName += optKrusher.value + "<br>";
                // above += bcz if user first select hot wings then it override but now it add after that
                //ie keep existing and add new one    
                adonCost = 40;
                imgCrusher.style.display = "block";
                imgCrusher.src = "../image/krusher-kfc.jpeg";
                mealCost += adonCost;   //here at total cost it adding
            }

            if (optWings.checked) {
                adonName += optWings.value + "<br>";
                adonCost = 60;
                imgHotWings.style.display = "block";
                imgHotWings.src = "../image/wings.jpeg";
                mealCost += adonCost;
            }

            total = mealCost;

            document.getElementById("lblMeal").innerHTML = mealName;
            document.getElementById("lblAdon").innerHTML = adonName;
            document.getElementById("lblTotal").innerHTML = `${total.toLocaleString('en-in', { style: "currency", currency: "INR" })}`;

        }
    </script>
</head>

<body class="container-fluid ">
    <header>
        <img src="../image/kfctop.jpeg" alt="kfc" width="100%" height="300px">
    </header>
    <section>
        <div class="accordion" id="kfc">
            <div class="accordion-item">
                <div class="accordion-header">
                    <button class="btn btn-danger w-100" data-bs-target="#customer" data-bs-toggle="collapse">
                        Customer Details
                    </button>
                </div>
                <div class="accordion-collapse collapse" id="customer" data-bs-parent="#kfc">
                    <div class="accordion-body bg-danger text-white mt-2">
                        <dl>
                            <dt>Customer Name</dt>
                            <dd><input type="text" id="txtName" class="form-control"></dd>
                            <dt>Mobile</dt>
                            <dd><input type="text" id="txtMobile" class="form-control"></dd>
                        </dl>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <div class="accordion-header">
                    <button data-bs-target="#meal" data-bs-toggle="collapse" class="btn btn-danger w-100">Select Your
                        Meal</button>
                </div>
                <div class="accordion-collapse collapse mt-2" id="meal" data-bs-parent="#kfc">
                    <div class="row">
                        <div class="col text-center">
                            <img src="../image/omg.jpeg" width="50%" height="300px">
                            <div class="fs-5">
                                <input class="form-check-input" id="optBurger" value="OMG Burger" name="meal"
                                    type="radio"><label>OMG Burger &#8377 120/-
                                </label>
                            </div>
                        </div>
                        <div class="col text-center">
                            <img src="../image/omg-2.jpeg" width="50%" height="300px">
                            <div class="fs-5">
                                <input class="form-check-input" id="optRoller" value="OMG Roller" name="meal"
                                    type="radio"><label>OMG Burger &#8377 150/-
                                </label>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header">
                    <button data-bs-target="#adon" data-bs-toggle="collapse" class="btn btn-danger w-100">Select
                        AD-ON's</button>
                </div>
                <div class="accordion-collapse collapse" id="adon" data-bs-parent="#kfc">
                    <div class="accordion-body">
                        <div class="row">
                            <div class="col fs-5 text-center">
                                <img src="../image/krusher-kfc.jpeg" alt="krusher" width="50%" height="300px">
                                <div>
                                    <input type="checkbox" class="form-check-input" id="optKrusher"
                                        value="Krusher Brownie">
                                    <label> Crusher Browing &#8377; 40/-</label>
                                </div>
                            </div>
                            <div class="col fs-5 text-center">
                                <img src="../image/wings.jpeg" alt="krusher" width="50%" height="300px">
                                <div>
                                    <input type="checkbox" class="form-check-input" id="optWings"
                                        value="HOT Wings 6pcs">
                                    <label> Hot Wings &#8377; 60/-</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button data-bs-target="#summary" data-bs-toggle="modal" class="btn btn-danger w-100 mt-1"
                    onclick="SummaryClick()">
                    View Order Summary
                </button>
                <div class="modal fade" id="summary">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>Your Bill Summary</h3>
                            </div>
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col">
                                        <dl>
                                            <dt>Customer Name</dt>
                                            <dd id="lblName"></dd>
                                            <dt>Mobile</dt>
                                            <dd id="lblMobile"></dd>
                                            <dt>Meal Name</dt>
                                            <dd id="lblMeal"></dd>
                                            <dt>Ad ON's</dt>
                                            <dd id="lblAdon"></dd>
                                            <dt>Total Amount</dt>
                                            <dd id="lblTotal"></dd>
                                        </dl>
                                    </div>
                                    <div class="col border border-1 bg-warning rounded rounded-2">
                                        <img alt="meal" id="imgMeal" width="250px" style="display: none;" height="200px"
                                            class="mt-1">
                                        <div class="row">
                                            <div class="col">
                                                <img alt="adON" id="crusher" style="display: none;" width="100%"
                                                    height="100px" class="m-1">
                                            </div>
                                            <div class="col">
                                                <img alt="adON" id="hotWings" style="display: none;" width="100%"
                                                    height="100px" class="m-1">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-warning" data-bs-dismiss="modal"> OK </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>
</body>

</html>
