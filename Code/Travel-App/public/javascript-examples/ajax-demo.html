<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax Demo</title>
    <script>
        function bodyload() {
            var now = new Date();
            console.log(`Page Loaded on : ${now.toLocaleTimeString()}`);
        }

        function LoadClick() {
            var now = new Date();
            console.log(`Load button Clicked at ${now.toLocaleTimeString()}`);
            // here if page load time != load button click then our page not loaded when click on button 
            // other wise it load 
            
            var http = new XMLHttpRequest();
            http.open("get", "../../data/help.txt", true);
            http.send();

            http.onreadystatechange = function () {
                if (http.readyState == 4) {
                    document.getElementById("container").innerHTML = http.responseText;
                }
            }
        }
    </script>
</head>

<body onload="bodyload()">
    <button onclick="LoadClick()">Load Help</button>
    <br><br>
    <pre id="container">

    </pre>
</body>

</html>
