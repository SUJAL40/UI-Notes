<script>
    function f1() {
        var n = parseInt(prompt("Enter Number"));
        switch (n) {
            case 1:
                document.write("You will get one<br>");
                break;
            case 2:
                document.write("You selected Two third one is free<br>");
            case 3:
                document.write("Collect your three<br>");
                break;
            default:
                document.write("Please enter a number between 1 to 3 only");
                break;
        }
    }
    f1();
</script>
