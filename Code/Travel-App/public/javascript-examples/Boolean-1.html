<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock</title>
    <script>
        function StockChange() {
            var checkbox = document.getElementById("optStock");
            var label = document.getElementById("lblStock");

            if (checkbox.checked) { //Here checkbox.checked is directly return true 
                label.innerHTML = "Avalable";
            } else {
                label.innerHTML = "Out Of Stock";
            }
        }
    </script>
</head>

<body>
    <dl>
        <dt>Stock</dt>
        <dd>
            <input type="checkbox" onchange="StockChange()" id="optStock">
            <label id="lblStock"> Out of Stock </label>
        </dd>
    </dl>
</body>

</html>
