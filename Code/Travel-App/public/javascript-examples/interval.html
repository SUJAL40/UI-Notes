<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intervals</title>
    <script>
        function msg1() {
            document.querySelector("p").innerHTML = "Hi";
        }

        function msg2() {
            document.querySelector("p").innerHTML = "How are you !";
        }

        function msg3() {
            document.querySelector("p").innerHTML = "Welcome to JS";
        }

        var m1, m2, m3;

        function buttonClick() {
            m1 = setTimeout(msg1, 2000);
            m2 = setTimeout(msg2, 4000);
            m3 = setTimeout(msg3, 6000);
        }

        function end2ndTask() {
            clearTimeout(m2);
        }


    </script>
</head>

<body>
    <div align="center">
        <button onclick="buttonClick()">Get Message !</button>
        <button onclick="end2ndTask()">End Second Task</button>
        <p></p>
    </div>
</body>

</html>
