<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Country</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.css">
    <script>
        var regExp = / /;
        var tip = "";

        function SetValidation(pattern, toolTip, image) {
            regExp = pattern;
            tip = toolTip;
            document.getElementById("imgFlag").src = image;
            document.getElementById("txtMobile").placeholder = tip;
        }

        function CountryChange() {
            var countryName = document.getElementById("lstCountries").value;

            switch (countryName) {
                case "INDIA":
                    SetValidation(/^\+91\d{10}$/,
                        "+91 and 10 digits",
                        "../../public/image/INDIA.jpeg");
                    break;

                case "US":
                    SetValidation(/^\+\(1\)\(\d{3}\)\s\d{4}-\d{4}$/,
                        "+(1)(000) 0000-0000",
                        "../../public/image/US.jpeg");
                    break;

                case "UK":
                    SetValidation(/^\+\(44\)\(\d{3}\)\s\d{4}\s\d{4}$/,
                        "+(44)(000) 0000 0000",
                        "../../public/image/UK.jpeg");
                    break;

                default:
                    SetValidation(/.*/, "Please Select Country", "");
                    break;

            }
        }

        function VerifyClick() {
            var mobile = document.getElementById("txtMobile").value;
            var lblError = document.getElementById("lblError");

            if (mobile.match(regExp)) {
                document.write(`<h2>Your Mobile ${mobile} Verified Successfully ..</h2>`)
            } else {
                lblError.innerHTML = `Invalid Mobile: ${tip}`;
            }
        }

    </script>
</head>

<body class="container-fluid">
    <h2>Verify Your Mobile</h2>
    <dl class="w-25">
        <dt>Select Your Country</dt>
        <dd class="input-group">
            <select class="form-select" id="lstCountries" onchange="CountryChange()">
                <option>Choose Country</option>
                <option>INDIA</option>
                <option>US</option>
                <option>UK</option>
            </select>
            <img class="input-group-text" width="50" id="imgFlag">
        </dd>
        <dt>Mobile Number</dt>
        <dd><input type="text" class="form-control" id="txtMobile"></dd>
        <dd id="lblError" class="text-danger"></dd>
        <button class="btn btn-primary w-100 mt-3" onclick="VerifyClick()">Verify</button>
    </dl>
</body>

</html>
