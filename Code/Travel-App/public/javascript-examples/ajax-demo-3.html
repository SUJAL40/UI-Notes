<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Representation</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <script>
        function bodyLoad() {
            fetch("../../data/products.json")
                .then(function (response) {
                    return response.json();
                })
                .then(function (products) {
                    products.map(function (product) {
                        var div = document.createElement("div");
                        div.className = "row my-4 border border-1 m-4 p-2";
                        div.innerHTML = `
                            <div class="col-2">
                                <img src="${product.image}" width="100%">
                            </div>
                            <div class="col-8">
                                <div class="h4">${product.title}</div>
                                <div class="my-2">
                                    <span class="badge bg-success p-1 rounded">
                                        ${product.rating.rate} 
                                            <span class="bi bi-star-fill"> </span>    
                                    </span>
                                    <span class="ms-3 text-secondary fw-bold">
                                        ${product.rating.ratings} ratings &
                                        ${product.rating.reviews} reviews
                                    </span>
                                </div>
                            </div>
                            <div class="col-2">
                                <div class="h2"> &#8377 ${product.price.toLocaleString()}</div>
                            </div>
                        `;

                        document.querySelector("section").appendChild(div);
                    })
                })
        }
    </script>
</head>

<body class="container-fluid" onload="bodyLoad()">
    <section>

    </section>
</body>

</html>
