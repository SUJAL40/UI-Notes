<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Manipulation</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    <script type="text/javascript">
        var menuItems = ["Home", "Shop"];

        function LoadMenuItems() {
            document.getElementById("lstMenuItems").innerHTML = "";
            menuItems.map(function (item) {
                var option = document.createElement("option");
                option.text = item;
                option.value = item;
                document.getElementById("lstMenuItems").appendChild(option);
            });
            document.getElementById("lblCount").innerHTML = menuItems.length;
        }

        function AddClick() {
            // var item_name = document.getElementById("txtName").value;
            // menuItems.push(item_name);
            // alert(`${item_name} Added Successfully.. `);
            // LoadMenuItems();
            // document.getElementById("txtName").value = "";
            // //After adding in inputbox we need to clean up

            var item_name = document.getElementById("txtName").value;
            if (menuItems.indexOf(item_name) == -1) {
                menuItems.push(item_name);
                alert(`${item_name} Added Successfully.. `);
                LoadMenuItems();
                document.getElementById("txtName").value = "";
            } else {
                alert(`${item_name} Exists`);
            }
        }


        function RemoveClick() {
            var selectedItem = document.getElementById("lstMenuItems").value;
            var selectedItemIndex = menuItems.indexOf(selectedItem);
            var flag = confirm(`Are you sure ?\nWant to delete ${selectedItem}`);
            if (flag == true) {
                menuItems.splice(selectedItemIndex, 1);
                LoadMenuItems();
            }
        }

        function RemoveAllclick() {
            var flag = confirm(`Are you sure ?\nWant to delete All item`);
            if (flag) {
                menuItems.length = 0;
                LoadMenuItems();
            }
        }

        function EditClick() {
            var selectedItem = document.getElementById("lstMenuItems").value;
            document.getElementById("txtEdit").value = selectedItem;
        }

        function SaveClick() {
            var newValue = document.getElementById("txtEdit").value;
            var selectedItem = document.getElementById("lstMenuItems").value;
            var selectedIndex = menuItems.indexOf(selectedItem);

            menuItems[selectedIndex] = newValue;
            LoadMenuItems();
        }

        function SortAsc() {
            menuItems.sort();
            LoadMenuItems();
        }
        function SortDesc() {
            menuItems.sort();
            menuItems.reverse();
            LoadMenuItems();

        }

    </script>
</head>

<body class="container-fluid" onload="LoadMenuItems()">

    <div class="mt-3 w-50">
        <h2>Design Your menu</h2>
        <div>
            <label class="form-label fw-bold">Add menu items</label>
            <div class="input-group">
                <input type="text" class="form-control" id="txtName" placeholder="New menu item name">
                <button class="btn btn-primary" onclick="AddClick()">Add item</button>
            </div>
        </div>

        <div class="my-2">
            <label class="form-label fw-bold">Menu Items <span class="badge bg-danger" id="lblCount"></span> </label>
            <button onclick="SortAsc()" class="bi bi-sort-alpha-down btn btn-success"></button>
            <button onclick="SortDesc()" class="bi bi-sort-alpha-up btn btn-warning"></button>
            <div class="my-3">
                <select class="form-select" size="3" id="lstMenuItems">
                </select>
                <div class="mt-2 row">
                    <div class="col">
                        <button data-bs-toggle="modal" onclick="EditClick()" data-bs-target="#edit"
                            class="btn w-100 btn-warning bi bi-pen-fill">Edit</button>
                        <div class="modal fade" id="edit">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h3>Edit Item</h3>
                                    </div>
                                    <div class="modal-body">
                                        <input type="text" class="form-control" id="txtEdit">
                                    </div>
                                    <div class="modal-footer">
                                        <button class="btn btn-success" data-bs-dismiss="modal"
                                            onclick="SaveClick()">Save</button>
                                        <button class="btn btn-danger" data-bs-dismiss="modal">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <button onclick="RemoveClick()" class="btn w-100 btn-danger bi bi-trash-fill">Remove</button>
                    </div>
                    <div class="col">
                        <button onclick="RemoveAllclick()" class="btn w-100 btn-outline-danger bi bi-trash">Remove
                            All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
