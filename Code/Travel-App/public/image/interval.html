<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intervals</title>
    <script>
        function bodyLoad() {
            var p = document.querySelector("p");

            setInterval(() => {
                var now = new Date();
                p.innerHTML = now.toLocaleString();
            }, 1000);
        }
    </script>
</head>

<body onload="bodyLoad()">
    <p></p>
</body>

</html>
